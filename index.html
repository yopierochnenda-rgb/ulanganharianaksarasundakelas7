<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Aksara Sunda - Rules Official</title>
    <style>
        :root {
            --primary: #2c3e50; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --bg: #f4f7f6;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: #333; }
        
        /* LOGIN SCREEN */
        #login-screen { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: linear-gradient(135deg, #1e3c72, #2a5298); 
        }
        .login-card { 
            background: white; padding: 40px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 380px; 
        }
        .login-card input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; 
            font-size: 1rem; text-align: center; 
        }
        .btn-start { 
            background: var(--success); color: white; border: none; 
            padding: 12px 30px; border-radius: 6px; cursor: pointer; 
            font-weight: bold; width: 100%; margin-top: 10px; 
        }
        .btn-start:disabled { background: #ccc; cursor: not-allowed; }

        /* INTERFACE UJIAN */
        #exam-interface { display: none; flex-direction: column; height: 100vh; }
        header { 
            background: white; padding: 15px 30px; border-bottom: 2px solid #ddd; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .main-content { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        
        .sidebar { 
            width: 260px; background: white; border: 1px solid #ddd; 
            border-radius: 8px; padding: 20px; display: flex; flex-direction: column; 
        }
        .grid-nav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; overflow-y: auto; margin: 15px 0; }
        .q-box { 
            border: 1px solid #ccc; padding: 10px 0; text-align: center; 
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; 
        }
        .q-box.active { border: 2px solid var(--primary); background: #eef2f7; }
        .q-box.answered { background: var(--success); color: white; border-color: var(--success); }

        .question-card { 
            flex: 1; background: white; border: 1px solid #ddd; 
            border-radius: 8px; display: flex; flex-direction: column; 
        }
        .q-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; }
        .q-body { padding: 40px; flex: 1; overflow-y: auto; }
        
        .aksara-display { 
            font-size: 5rem; text-align: center; margin: 20px 0; color: var(--primary); 
            min-height: 120px; display: flex; align-items: center; justify-content: center; 
            background: #f9f9f9; border-radius: 10px; border: 1px dashed #ccc; 
        }
        
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { 
            border: 1px solid #ddd; padding: 15px; border-radius: 8px; 
            cursor: pointer; display: flex; align-items: center; 
        }
        .option-btn input { margin-right: 15px; transform: scale(1.3); }
        
        .q-footer { padding: 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; background: #fafafa; }
        .btn { padding: 12px 25px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-finish { 
            background: var(--success); color: white; margin-top: auto; 
            padding: 15px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; 
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="margin:0; color: var(--primary);">RULES CBT</h2>
            <p style="font-size: 0.9rem;">Database: <b>DataSiswa</b> | Rekap: <b>RekapNilai</b></p>
            <input type="number" id="nisn-input" placeholder="Lebetkeun NIS Murid">
            <button id="btn-login" class="btn-start" onclick="startExam()" disabled>NGADAGOAN DATA...</button>
            <p id="status-db" style="font-size: 0.75rem; color: #666; margin-top: 15px;">Ngahubungkeun ka Google Sheets...</p>
        </div>
    </div>

    <div id="exam-interface">
        <header>
            <div><h3 style="margin:0">CBT Aksara Sunda</h3><small id="user-info"></small></div>
            <div id="timer" style="font-weight: bold; color: var(--danger); font-size: 1.2rem;">Sisa Waktu: 30:00</div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div style="font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px;">Navigasi Soal</div>
                <div class="grid-nav" id="nav-grid"></div>
                <button class="btn-finish" onclick="confirmFinish()">Selesai Ujian</button>
            </aside>

            <main class="question-card">
                <div class="q-header">
                    <span id="q-number-label">Soal -</span>
                    <span id="q-cat-label" style="color: var(--warning); font-size: 0.8rem; text-transform: uppercase;"></span>
                </div>
                <div class="q-body">
                    <div id="q-text" style="font-size: 1.3rem; margin-bottom: 20px;"></div>
                    <div id="aksara-box" class="aksara-display"></div>
                    
                    <div class="options-container">
                        <label class="option-btn"><input type="radio" name="opt" value="a"> <span id="label-a"></span></label>
                        <label class="option-btn"><input type="radio" name="opt" value="b"> <span id="label-b"></span></label>
                        <label class="option-btn"><input type="radio" name="opt" value="c"> <span id="label-c"></span></label>
                        <label class="option-btn"><input type="radio" name="opt" value="d"> <span id="label-d"></span></label>
                    </div>
                </div>
                <div class="q-footer">
                    <button class="btn" style="background:#95a5a6; color:white" onclick="move(-1)">Sateuacanna</button>
                    <button class="btn" style="background:#3498db; color:white" onclick="move(1)">Salajengna</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        // URL SCRIPT ANU PARANTOS JALAN
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzP7yxRacAIVieKB5aZhkwQXxxMlSFeHzCVYnFnWZSeHOMfvkTOWqBV-akWxGknfhg1/exec";

        let dbSiswa = [];
        let currentIdx = 0;
        let answers = {};
        let timeRemaining = 30 * 60;
        let muridLogin = null;

        // Ambil data murid nalika kaca dibuka
        window.onload = async () => {
            const statusLabel = document.getElementById('status-db');
            const loginBtn = document.getElementById('btn-login');
            try {
                const response = await fetch(SCRIPT_URL);
                dbSiswa = await response.json();
                statusLabel.innerText = "Database Online Siap!";
                statusLabel.style.color = "green";
                loginBtn.disabled = false;
                loginBtn.innerText = "LOGIN & MULAI";
            } catch (e) {
                statusLabel.innerText = "Gagal nyambung ka Database!";
                statusLabel.style.color = "red";
            }
        };

        const masterSoal = [
            { id: 1, cat: "Ngalagena", q: "Manakah lambang aksara Sunda pikeun sora 'KA'?", img: "", o: {a:"ᮊ", b:"ᮌ", c:"ᮍ", d:"ᮠ"}, k: "a" },
            { id: 2, cat: "Ngalagena", q: "Manakah lambang aksara Sunda pikeun sora 'LA'?", img: "", o: {a:"ᮛ", b:"ᮜ", c:"ᮝ", d:"ᮯ"}, k: "b" },
            { id: 3, cat: "Ngalagena", q: "Manakah lambang aksara Sunda pikeun sora 'SA'?", img: "", o: {a:"ᮕ", b:"ᮘ", c:"ᮞ", d:"ᮊ"}, k: "c" },
            { id: 4, cat: "Ngalagena", q: "Manakah lambang aksara Sunda pikeun sora 'MA'?", img: "", o: {a:"ᮙ", b:"ᮔ", c:"ᮚ", d:"ᮜ"}, k: "a" },
            { id: 5, cat: "Swara", q: "Manakah aksara Swara pikeun sora 'E' (lele)?", img: "", o: {a:"ᮃ", b:"ᮈ", c:"ᮇ", d:"ᮅ"}, k: "b" },
            { id: 6, cat: "Swara", q: "Manakah aksara Swara pikeun sora 'O'?", img: "", o: {a:"ᮄ", b:"ᮉ", c:"ᮇ", d:"ᮈ"}, k: "c" },
            { id: 7, cat: "Swara", q: "Manakah aksara Swara pikeun sora 'EU'?", img: "", o: {a:"ᮈ", b:"ᮇ", c:"ᮃ", d:"ᮉ"}, k: "d" },
            { id: 8, cat: "Nulis", q: "Mana nu bener nuliskeun kecap 'Sasmita'?", img: "", o: {a:"ᮞᮞ᮪ᮙᮤᮒ", b:"ᮞᮞ᮪ᮙᮒᮤ", c:"ᮞᮞ᮪ᮙᮦᮒ", d:"ᮞᮞᮙ᮪ᮒ"}, k: "a" },
            { id: 9, cat: "Rarangken", q: "Aksara 'ᮙ' (MA) dibéré rarangken Panyakra jeung Panghulu dibaca...", img: "", o: {a:"MRAI", b:"MRU", c:"MRI", d:"MRA"}, k: "c" },
            { id: 10, cat: "Nulis", q: "Nulis kecap 'Pramuka' nu bener nyaéta...", img: "", o: {a:"ᮕᮡᮙᮥᮊ", b:"ᮕᮢᮙᮥᮊ", c:"ᮕᮢᮙᮥᮊ᮪", d:"ᮕᮙᮢᮥᮊ"}, k: "b" },
            { id: 11, cat: "Analisis", q: "Dina kecap 'Kicimpring', rarangken naon waé nu dipaké?", img: "", o: {a:"Panghulu, Panyecek, Panyakra", b:"Pamepet, Panyuku, Pangwisad", c:"Panolong, Paneuleung, Pamingkal", d:"Panghulu, Panglayar, Pamepet"}, k: "a" },
            { id: 12, cat: "Rarangken", q: "Kecap 'Bareuh' merlukeun rarangken vokal...", img: "", o: {a:"Pamepet & Pangwisad", b:"Paneuleung & Panyecek", c:"Paneuleung & Pangwisad", d:"Paneuleung & Panglayar"}, k: "c" },
            { id: 13, cat: "Rarangken", q: "Nulis kecap 'Cowét' merlukeun rarangken...", img: "", o: {a:"Panolong & Pamepet", b:"Panolong & Paneuleung", c:"Panolong & Paneled", d:"Panolong & Panghulu"}, k: "c" },
            { id: 14, cat: "Nulis", q: "Nulis kecap 'Boléd' mun ditulis aksara Sunda nyaéta...", img: "", o: {a:"ᮘᮧᮜᮦᮓ᮪", b:"ᮘᮥᮜᮨᮓ᮪", c:"ᮘᮧᮜᮨᮓ᮪", d:"ᮘᮧᮜᮉᮓ᮪"}, k: "a" },
            { id: 15, cat: "Maca", q: "Pék baca lambang ieu:", img: "ᮌᮏᮂ", o: {a:"GAJAH", b:"GAJIH", c:"GAJANG", d:"GAJAR"}, k: "a" },
            { id: 16, cat: "Maca", q: "Pék baca lambang ieu:", img: "ᮊᮞᮥᮛ᮪", o: {a:"KASUR", b:"KASUH", c:"KASUNG", d:"KASUM"}, k: "a" },
            { id: 17, cat: "Rarangken", q: "Rarangken Panyecek dina lambang 'ᮊᮀ' nuduhkeun sora...", img: "ᮊᮀ", o: {a:"R", b:"H", c:"NG", d:"S"}, k: "c" },
            { id: 18, cat: "Teori", q: "Naon bédana Panyakra (-r-) jeung Panglayar (-r)?", img: "", o: {a:"Panyakra di tengah, Panglayar di tungtung", b:"Panyakra di tungtung, Panglayar di tengah", c:"Teu aya bédana", d:"Panyakra vokal"}, k: "a" },
            { id: 19, cat: "Maca", q: "Pék baca lambang ieu:", img: "ᮜᮥᮠᮥᮛ᮪", o: {a:"LUHUR", b:"LAHAR", c:"LUHAR", d:"LUHUH"}, k: "a" },
            { id: 20, cat: "Maca", q: "Pék baca lambang ieu:", img: "ᮙᮔᮥᮞ᮪ᮛ", o: {a:"MANUSRA", b:"MANUSIA", c:"MANUSSA", d:"MANARU"}, k: "a" },
            { id: 21, cat: "Rarangken", q: "Rarangken nu fungsina maéhan sora vokal 'A' disebut...", img: "", o: {a:"Pamingkal", b:"Pamepet", c:"Pamaéh", d:"Panyakra"}, k: "c" },
            { id: 22, cat: "Analisis", q: "Aksara 'ᮊ' ditambahan rarangken Pamingkal dibaca...", img: "", o: {a:"KRA", b:"KLA", c:"KYA", d:"KWA"}, k: "c" },
            { id: 23, cat: "Nulis", q: "Mana nulis kecap 'Krupuk' anu bener?", img: "", o: {a:"ᮊᮢᮥᮕᮥᮊ᮪", b:"ᮊᮢᮥᮕᮥᮊ", c:"ᮊᮥᮛᮥᮕᮥᮊ᮪", d:"ᮊᮢᮥᮕᮥᮊᮂ"}, k: "a" },
            { id: 24, cat: "Teori", q: "Rarangken anu perenahna aya di handapeun aksara nyaéta...", img: "", o: {a:"Panghulu & Pamepet", b:"Panyuku & Panyakra", c:"Panyecek & Panglayar", d:"Pamaéh & Paneled"}, k: "b" },
            { id: 25, cat: "Maca", q: "Pék baca lambang ieu:", img: "ᮜᮥᮙ᮪ᮕᮒ᮪", o: {a:"LUMPAT", b:"LOMPAT", c:"LIMPIT", d:"LAMPAT"}, k: "a" }
        ];

        function startExam() {
            const nisInput = document.getElementById('nisn-input').value.trim();
            muridLogin = dbSiswa.find(s => s.nis === nisInput);
            
            if (muridLogin) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('exam-interface').style.display = 'flex';
                document.getElementById('user-info').innerText = `${muridLogin.nama} (${muridLogin.nis})`;
                
                // Acak soal
                for(let i=masterSoal.length-1; i>0; i--){
                    const j = Math.floor(Math.random()*(i+1));
                    [masterSoal[i], masterSoal[j]] = [masterSoal[j], masterSoal[i]];
                }
                
                initNav(); render(); startTimer();
            } else { alert("NIS teu kadaptar!"); }
        }

        function initNav() {
            const grid = document.getElementById('nav-grid'); grid.innerHTML = "";
            masterSoal.forEach((_, i) => {
                const b = document.createElement('div');
                b.className = 'q-box'; b.id = `nav-${i}`; b.innerText = i + 1;
                b.onclick = () => { currentIdx = i; render(); };
                grid.appendChild(b);
            });
        }

        function render() {
            const s = masterSoal[currentIdx];
            document.getElementById('q-number-label').innerText = `Soal ${currentIdx+1}`;
            document.getElementById('q-cat-label').innerText = s.cat;
            document.getElementById('q-text').innerText = s.q;
            
            const box = document.getElementById('aksara-box');
            box.innerText = s.img;
            box.style.display = s.img === "" ? "none" : "flex";

            document.getElementById('label-a').innerText = s.o.a;
            document.getElementById('label-b').innerText = s.o.b;
            document.getElementById('label-c').innerText = s.o.c;
            document.getElementById('label-d').innerText = s.o.d;

            const rads = document.getElementsByName('opt');
            rads.forEach(r => {
                r.checked = (answers[currentIdx] === r.value);
                r.onclick = () => { answers[currentIdx] = r.value; updateNav(); };
            });
            updateNav();
        }

        function updateNav() {
            masterSoal.forEach((_, i) => {
                const b = document.getElementById(`nav-${i}`);
                b.className = 'q-box';
                if (i === currentIdx) b.classList.add('active');
                if (answers[i]) b.classList.add('answered');
            });
        }

        function move(d) {
            currentIdx += d;
            if (currentIdx < 0) currentIdx = 0;
            if (currentIdx >= masterSoal.length) currentIdx = masterSoal.length - 1;
            render();
        }

        function startTimer() {
            const tDiv = document.getElementById('timer');
            const interval = setInterval(() => {
                let m = Math.floor(timeRemaining / 60); let s = timeRemaining % 60;
                tDiv.innerText = `Sisa Waktu: ${m}:${s < 10 ? '0'+s : s}`;
                if (timeRemaining <= 0) { clearInterval(interval); finish(); }
                timeRemaining--;
            }, 1000);
        }

        function confirmFinish() { if (confirm("Yakin rengse ujian?")) finish(); }

        async function finish() {
            let correct = 0;
            masterSoal.forEach((s, i) => { if (answers[i] === s.k) correct++; });
            const peunteun = (correct * 2) / 5 * 10;
            
            document.querySelector('.main-content').innerHTML = `
                <div style="width:100%; text-align:center; padding:50px;">
                    <h2>Sakedap, nuju ngirim hasil ka RekapNilai...</h2>
                </div>
            `;

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        nama: muridLogin.nama, 
                        nis: muridLogin.nis, 
                        nilai: peunteun.toFixed(0) 
                    })
                });
            } catch (e) { console.error("Gagal ngirim rekap:", e); }

            document.querySelector('.main-content').innerHTML = `
                <div style="width:100%; text-align:center; background:white; padding:50px; border-radius:8px;">
                    <h1 style="color: var(--primary);">HASIL UJIAN</h1>
                    <p><strong>${muridLogin.nama}</strong></p>
                    <div style="font-size:100px; color:var(--success); font-weight:bold;">${peunteun.toFixed(0)}</div>
                    <p>Data parantos direkap dina Google Sheets.</p>
                    <button class="btn" style="background:var(--primary); color:white; margin-top:30px" onclick="location.reload()">LOGOUT</button>
                </div>
            `;
            document.querySelector('.sidebar').style.display = 'none';
        }
    </script>
</body>
</html>
