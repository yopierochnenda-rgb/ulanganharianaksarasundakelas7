<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RULES CBT - ANTI-BOCOR FIX</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --blue: #3498db; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg); overflow-x: hidden; }

        /* --- LOGIN --- */
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1e3c72; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; text-align: center; font-size: 16px; }
        .btn-start { background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        /* --- INTERFACE --- */
        #exam-interface { display: none; flex-direction: column; min-height: 100vh; }
        header { background: white; padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }

        .main-content { padding: 15px; max-width: 500px; margin: 0 auto; width: 100%; padding-bottom: 120px; }

        /* --- SOAL --- */
        .question-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #q-text { font-weight: bold; margin-bottom: 15px; line-height: 1.4; color: var(--primary); font-size: 1.1rem; }
        .aksara-display { font-size: 3.5rem; text-align: center; margin: 15px 0; padding: 20px; background: #f9f9f9; border-radius: 15px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; min-height: 100px; }

        /* --- JAWABAN TABLE SYSTEM --- */
        .options-container { width: 100%; margin-top: 10px; }
        .option-btn { 
            display: table; width: 100%; background: #ffffff; border: 2px solid #e0e0e0; 
            border-radius: 15px; margin-bottom: 12px; cursor: pointer; overflow: hidden; 
        }
        .radio-cell { display: table-cell; vertical-align: middle; width: 50px; text-align: center; background: #fcfcfc; border-right: 1px solid #eee; }
        .radio-cell input { transform: scale(1.5); margin: 0; }
        .text-cell { display: table-cell; vertical-align: middle; padding: 15px 20px; font-size: 16px; font-weight: 600; color: #333; text-align: left; }

        /* Status Pilih */
        .option-btn.active { border-color: var(--blue); background: #f0f7ff; }
        .option-btn.active .radio-cell { background: #e1effe; border-right-color: var(--blue); }

        /* --- NAVIGASI --- */
        .grid-nav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .q-box { border: 1px solid #ddd; padding: 12px 0; text-align: center; border-radius: 8px; font-weight: bold; background: #fdfdfd; cursor: pointer; }
        .q-box.current { border: 2px solid var(--blue); color: var(--blue); background: #f0f7ff; }
        .q-box.filled { background: var(--success); color: white; border-color: var(--success); }

        .q-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; z-index: 1000; }
        .btn-nav { flex: 1; padding: 16px; border-radius: 12px; border: none; font-weight: bold; color: white; font-size: 16px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:var(--primary);">RULES CBT</h2>
            <input type="text" id="nami-input" list="daftar-nami" placeholder="Pilih Nami..." autocomplete="off">
            <datalist id="daftar-nami"></datalist>
            <input type="text" id="nisn-input" placeholder="NIS" readonly style="background:#f5f5f5;">
            <input type="text" id="kelas-input" placeholder="Kelas" readonly style="background:#f5f5f5;">
            <button id="btn-login" class="btn-start" onclick="startExam()" disabled>LOADING...</button>
        </div>
    </div>

    <div id="exam-interface">
        <header>
            <div id="user-info" style="font-weight:bold;"></div>
            <div id="timer" style="color:var(--danger); font-weight:bold;">30:00</div>
        </header>

        <div class="main-content">
            <div class="question-card">
                <div id="q-text"></div>
                <div id="aksara-box" class="aksara-display"></div>
                
                <div class="options-container">
                    <label class="option-btn" id="box-a">
                        <div class="radio-cell"><input type="radio" name="opt" value="a"></div>
                        <div class="text-cell" id="label-a"></div>
                    </label>
                    <label class="option-btn" id="box-b">
                        <div class="radio-cell"><input type="radio" name="opt" value="b"></div>
                        <div class="text-cell" id="label-b"></div>
                    </label>
                    <label class="option-btn" id="box-c">
                        <div class="radio-cell"><input type="radio" name="opt" value="c"></div>
                        <div class="text-cell" id="label-c"></div>
                    </label>
                    <label class="option-btn" id="box-d">
                        <div class="radio-cell"><input type="radio" name="opt" value="d"></div>
                        <div class="text-cell" id="label-d"></div>
                    </label>
                </div>
            </div>

            <div style="background:white; border-radius:20px; padding:20px; margin-top:20px;">
                <div style="font-size:0.8rem; font-weight:bold; color:#888;">NOMOR SOAL:</div>
                <div class="grid-nav" id="nav-grid"></div>
                <button class="btn-start" onclick="confirmFinish()" style="margin-top:25px; background:var(--primary);">RENGSE UJIAN</button>
            </div>
        </div>

        <div class="q-footer">
            <button class="btn-nav" style="background:#bdc3c7;" onclick="move(-1)">← KIRI</button>
            <button class="btn-nav" style="background:var(--blue);" onclick="move(1)">KATUHU →</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxNbwE1FPuZcoPzdYh_ZSGuv5L-JiIZpRLjFziKJiB7jz_fg5cRQalnB2KAEd3J7g/exec";
        let dbSiswa = [], currentIdx = 0, answers = {}, timeRemaining = 30 * 60, muridLogin = null;

        window.onload = async () => {
            try {
                const res = await fetch(SCRIPT_URL);
                dbSiswa = await res.json();
                const list = document.getElementById('daftar-nami');
                dbSiswa.forEach(m => { let o = document.createElement('option'); o.value = m.nama; list.appendChild(o); });
                document.getElementById('nami-input').addEventListener('input', function() {
                    const f = dbSiswa.find(s => s.nama === this.value);
                    if(f) { document.getElementById('nisn-input').value = f.nis; document.getElementById('kelas-input').value = f.kelas; }
                });
                document.getElementById('btn-login').disabled = false;
                document.getElementById('btn-login').innerText = "MULAI UJIAN";
            } catch (e) { alert("Server Error! Cobi refresh."); }
        };

        // DATA MASTER SOAL (JAWABAN DISUMPUTKEUN DINA KONCI 'K')
        const masterSoal = [
            { id: 1, q: "Manakah lambang aksara Sunda pikeun sora 'KA'?", img: "ᮊ", o: {a:"KA", b:"GA", c:"NGA", d:"HA"}, k: "a" },
            { id: 2, q: "Manakah lambang aksara Sunda pikeun sora 'LA'?", img: "ᮜ", o: {a:"RA", b:"LA", c:"WA", d:"YA"}, k: "b" },
            { id: 3, q: "Manakah lambang aksara Sunda pikeun sora 'SA'?", img: "ᮞ", o: {a:"PA", b:"BA", c:"SA", d:"KA"}, k: "c" },
            { id: 4, q: "Manakah lambang aksara Sunda pikeun sora 'MA'?", img: "ᮙ", o: {a:"MA", b:"NA", c:"YA", d:"LA"}, k: "a" },
            { id: 5, q: "Manakah aksara Swara pikeun sora 'E' (lele)?", img: "ᮈ", o: {a:"A", b:"E", c:"O", d:"I"}, k: "b" },
            { id: 6, q: "Manakah aksara Swara pikeun sora 'O'?", img: "ᮇ", o: {a:"I", b:"EU", c:"O", d:"E"}, k: "c" },
            { id: 7, q: "Manakah aksara Swara pikeun sora 'EU'?", img: "ᮉ", o: {a:"E", b:"O", c:"A", d:"EU"}, k: "d" },
            { id: 8, q: "Mana nu bener nuliskeun kecap 'Sasmita'?", img: "ᮞᮞ᮪ᮙᮤᮒ", o: {a:"Sasmita", b:"Sasmata", c:"Sasmitaa", d:"Sasmati"}, k: "a" },
            { id: 9, q: "Aksara 'ᮙ' (MA) dibéré rarangken Panyakra jeung Panghulu dibaca...", img: "ᮙᮢᮤ", o: {a:"MRAI", b:"MRU", c:"MRI", d:"MRA"}, k: "c" },
            { id: 10, q: "Nulis kecap 'Pramuka' nu bener nyaéta...", img: "ᮕᮢᮙᮥᮊ", o: {a:"Pramika", b:"Pramuka", c:"Pramuk", d:"Pamraka"}, k: "b" },
            { id: 11, q: "Dina lambang 'ᮊᮤᮔ᮪ᮕᮢᮤᮀ', rarangken naon waé nu dipaké?", img: "ᮊᮤᮔ᮪ᮕᮢᮤᮀ", o: {a:"Panghulu, Panyecek, Panyakra", b:"Panyuku, Pangwisad", c:"Panolong, Paneuleung", d:"Pamaéh, Panghulu"}, k: "a" },
            { id: 12, q: "Kecap 'Bareuh' merlukeun rarangken vokal...", img: "ᮘᮛᮩᮂ", o: {a:"Pamepet", b:"Paneuleung", c:"Paneuleung & Pangwisad", d:"Panyecek"}, k: "c" },
            { id: 13, q: "Nulis kecap 'Cowét' merlukeun rarangken...", img: "ᮎᮧᮝᮦᮒ᮪", o: {a:"Panolong & Pamepet", b:"Panolong & Paneled", c:"Panolong & Paneleung", d:"Panolong & Panghulu"}, k: "b" },
            { id: 14, q: "Nulis kecap 'Boléd' mun ditulis aksara Sunda nyaéta...", img: "ᮘᮧᮜᮦᮓ᮪", o: {a:"Baled", b:"Boled", c:"Buled", d:"Beuled"}, k: "b" },
            { id: 15, q: "Pék baca lambang ieu:", img: "ᮌᮏᮂ", o: {a:"GAJAH", b:"GAJIH", c:"GAJANG", d:"GAJAR"}, k: "a" },
            { id: 16, q: "Pék baca lambang ieu:", img: "ᮊᮞᮥᮛ᮪", o: {a:"KASUR", b:"KASUH", c:"KASUNG", d:"KASUM"}, k: "a" },
            { id: 17, q: "Rarangken Panyecek dina lambang 'ᮊᮀ' nuduhkeun sora...", img: "ᮊᮀ", o: {a:"R", b:"H", c:"NG", d:"S"}, k: "c" },
            { id: 18, q: "Naon bédana Panyakra (-r-) jeung Panglayar (-r)?", img: "", o: {a:"Panyakra di tengah, Panglayar di tungtung", b:"Teu aya bedana", c:"Panyakra vokal", d:"Panglayar konsonan"}, k: "a" },
            { id: 19, q: "Pék baca lambang ieu:", img: "ᮜᮥᮠᮥᮛ᮪", o: {a:"LUHUR", b:"LAHAR", c:"LUHAR", d:"LUHUH"}, k: "a" },
            { id: 20, q: "Pék baca lambang ieu:", img: "ᮙᮔᮥᮞ᮪ᮛ", o: {a:"MANUSRA", b:"MANUSIA", c:"MANUSSA", d:"MANARU"}, k: "a" },
            { id: 21, q: "Rarangken nu fungsina maéhan sora vokal 'A' disebut...", img: "᮪", o: {a:"Pamingkal", b:"Pamepet", c:"Pamaéh", d:"Panyakra"}, k: "c" },
            { id: 22, q: "Aksara 'ᮊ' ditambahan rarangken Pamingkal dibaca...", img: "ᮊᮡ", o: {a:"KRA", b:"KLA", c:"KYA", d:"KWA"}, k: "c" },
            { id: 23, q: "Mana nulis kecap 'Krupuk' anu bener?", img: "ᮊᮢᮥᮕᮥᮊ᮪", o: {a:"Krupuk", b:"Kurupuk", c:"Kaprupuk", d:"Krupukah"}, k: "a" },
            { id: 24, q: "Rarangken anu perenahna aya di handapeun aksara nyaéta...", img: "", o: {a:"Panghulu", b:"Panyuku & Panyakra", c:"Panyecek", d:"Pamaéh"}, k: "b" },
            { id: 25, q: "Pék baca lambang ieu:", img: "ᮜᮥᮙ᮪ᮕᮒ᮪", o: {a:"LUMPAT", b:"LOMPAT", c:"LIMPIT", d:"LAMPAT"}, k: "a" }
        ];

        function startExam() {
            const nis = document.getElementById('nisn-input').value;
            muridLogin = dbSiswa.find(s => s.nis == nis);
            if (muridLogin) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('exam-interface').style.display = 'flex';
                document.getElementById('user-info').innerText = muridLogin.nama + " (" + muridLogin.kelas + ")";
                initNav(); render(); startTimer();
            }
        }

        function initNav() {
            const grid = document.getElementById('nav-grid'); grid.innerHTML = "";
            masterSoal.forEach((_, i) => {
                const b = document.createElement('div'); b.className = 'q-box'; b.id = `nav-${i}`; b.innerText = i + 1;
                b.onclick = () => { currentIdx = i; render(); window.scrollTo(0,0); };
                grid.appendChild(b);
            });
        }

        function render() {
            const s = masterSoal[currentIdx];
            // FIXED: Ngan nampilkeun soal wungkul [cite: 2026-02-22]
            document.getElementById('q-text').innerText = (currentIdx + 1) + ". " + s.q;
            
            const box = document.getElementById('aksara-box');
            box.innerText = s.img; box.style.display = s.img==="" ? "none":"flex";
            
            document.getElementById('label-a').innerText = s.o.a;
            document.getElementById('label-b').innerText = s.o.b;
            document.getElementById('label-c').innerText = s.o.c;
            document.getElementById('label-d').innerText = s.o.d;
            
            const rads = document.getElementsByName('opt');
            rads.forEach(r => {
                r.checked = (answers[currentIdx] === r.value);
                const parent = r.closest('.option-btn');
                if(r.checked) parent.classList.add('active');
                else parent.classList.remove('active');

                r.onclick = () => { answers[currentIdx] = r.value; updateNav(); render(); };
            });
            updateNav();
        }

        function updateNav() {
            masterSoal.forEach((_, i) => {
                const b = document.getElementById(`nav-${i}`);
                b.className = 'q-box';
                if (i === currentIdx) b.classList.add('current');
                if (answers[i]) b.classList.add('filled');
            });
        }

        function move(d) { currentIdx += d; if(currentIdx < 0) currentIdx=0; if(currentIdx >= masterSoal.length) currentIdx=masterSoal.length-1; render(); window.scrollTo(0,0); }

        function startTimer() {
            const t = setInterval(() => {
                let m = Math.floor(timeRemaining / 60), s = timeRemaining % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (timeRemaining <= 0) { clearInterval(t); finish(); }
                timeRemaining--;
            }, 1000);
        }

        function confirmFinish() { if(confirm("Yakin réngsé?")) finish(); }

        async function finish() {
            let correct = 0;
            masterSoal.forEach((s, i) => { if(answers[i] === s.k) correct++; });
            const score = (correct / masterSoal.length) * 100;
            document.querySelector('.main-content').innerHTML = "<h2>Ngirim data...</h2>";
            try {
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ nama: muridLogin.nama, nis: muridLogin.nis, kelas: muridLogin.kelas, peunteun: score.toFixed(0) }) });
            } catch (e) {}
            document.querySelector('.main-content').innerHTML = `
                <div style="text-align:center; padding:50px; background:white; border-radius:20px;">
                    <h1 style="color:var(--primary);">SKOR AKHIR</h1>
                    <div style="font-size:80px; color:var(--success); font-weight:bold; margin:20px 0;">${score.toFixed(0)}</div>
                    <p>${muridLogin.nama}<br>Ujian parantos lekasan.</p>
                    <button class="btn-start" onclick="location.reload()">LOGOUT</button>
                </div>
            `;
            document.querySelector('.q-footer').style.display = 'none';
        }
    </script>
</body>
</html>
