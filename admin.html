<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN RULES - MONITORING LENGKEP</title>
    <style>
        :root { --primary: #1a4d2e; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --blue: #3498db; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* TAB SYSTEM */
        .tab-menu { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; color: #666; font-size: 12px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .control-panel { background: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; min-width: 140px; font-size: 13px; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: white; padding: 12px; border-radius: 10px; text-align: center; border-bottom: 3px solid #eee; }
        .stat-card h3 { margin: 0; font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: bold; }

        .table-container { background: white; border-radius: 12px; padding: 10px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8f9fa; padding: 12px 10px; text-align: left; color: #666; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .st-aktif { background: #e3f2fd; color: #1976d2; }
        .st-nyontek { background: #fee2e2; color: #dc2626; animation: blinker 1s infinite; }
        .st-selesai { background: #dcfce7; color: #166534; }
        .st-absent { background: #fef3c7; color: #d97706; }
        @keyframes blinker { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0; font-size: 18px;">RULES MONITORING</h2>
        <button onclick="loadData()" style="padding:8px 15px; border-radius:6px; border:none; font-weight:bold; cursor:pointer;">🔄 REFRESH</button>
    </header>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('monitoring')">LIVE MONITORING</button>
        <button class="tab-btn" onclick="switchTab('absensi')">ACAN UJIAN (BELUM)</button>
    </div>

    <div class="control-panel">
        <span style="font-size: 12px; font-weight: bold; color: #777;">FILTER KELAS:</span>
        <select id="filter-kelas" onchange="renderAll()">
            <option value="SEMUA">-- Sadayana --</option>
        </select>
        <button onclick="exportExcel()" style="background:var(--success); color:white; border:none; padding:10px 15px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:12px;">📊 DOWNLOAD EXCEL</button>
    </div>

    <div id="view-monitoring">
        <div class="stats-grid">
            <div class="stat-card"><h3>TOTAL ASUP</h3><p id="stat-total">0</p></div>
            <div class="stat-card" style="border-color: #3498db;"><h3>AKTIF</h3><p id="stat-aktif" style="color:#3498db;">0</p></div>
            <div class="stat-card" style="border-color: var(--danger);"><h3>NYONTEK</h3><p id="stat-nyontek" style="color:var(--danger);">0</p></div>
            <div class="stat-card" style="border-color: var(--success);"><h3>SELESAI</h3><p id="stat-selesai" style="color:var(--success);">0</p></div>
        </div>
        <div class="table-container">
            <table id="tabel-monitoring">
                <thead>
                    <tr><th>WAKTU</th><th>NAMI</th><th>NIS</th><th>KELAS</th><th>PEUNTEUN</th><th>CHEAT</th><th>STATUS</th></tr>
                </thead>
                <tbody id="body-monitoring"></tbody>
            </table>
        </div>
    </div>

    <div id="view-absensi" style="display:none;">
        <div class="stat-card" style="margin-bottom:15px; border-color:var(--danger);">
            <h3>MURID ANU TEU ACAN LOGIN / UJIAN</h3>
            <p id="stat-absent" style="color:var(--danger);">0</p>
        </div>
        <div class="table-container">
            <table id="tabel-absent">
                <thead>
                    <tr><th>NAMI MURID</th><th>NIS</th><th>KELAS</th><th>STATUS</th></tr>
                </thead>
                <tbody id="body-absent"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6Ef7CfyJlMVy78391qO1X6H5ERi281jLTYaU1oun1dVONJnHjASBn9MAKMrVkHovC/exec";
        let rawData = [], allSiswa = [], activeTab = 'monitoring';

        async function loadData() {
            try {
                // Tarik data Rekap & DataSiswa sakaligus
                const [resRekap, resSiswa] = await Promise.all([
                    fetch(SCRIPT_URL + "?sheet=RekapNilai"),
                    fetch(SCRIPT_URL + "?sheet=DataSiswa")
                ]);
                rawData = await resRekap.json();
                allSiswa = await resSiswa.json();

                updateDropdown();
                renderAll();
            } catch (e) { console.error("Error:", e); }
        }

        function updateDropdown() {
            const select = document.getElementById('filter-kelas');
            const current = select.value;
            const listKelas = [...new Set(allSiswa.map(m => m.Kelas || m.kelas || Object.values(m)[2]))].filter(Boolean).sort();
            select.innerHTML = '<option value="SEMUA">-- Sadayana --</option>';
            listKelas.forEach(k => { select.innerHTML += `<option value="${k}">${k}</option>`; });
            select.value = current;
        }

        function renderAll() {
            const filter = document.getElementById('filter-kelas').value;
            renderMonitoring(filter);
            renderAbsent(filter);
        }

        function renderMonitoring(filter) {
            const tbody = document.getElementById('body-monitoring');
            tbody.innerHTML = "";
            const filtered = rawData.filter(m => filter === "SEMUA" || (m.kelas || m.Kelas) === filter);
            
            [...filtered].reverse().forEach(m => {
                let st = (m.status || m.Status || "AKTIF").toUpperCase();
                let cls = st === "NYONTEK" ? "st-nyontek" : (st === "SELESAI" ? "st-selesai" : "st-aktif");
                tbody.innerHTML += `<tr>
                    <td style="font-size:10px; color:#999;">${m.waktu || m.timestamp || '-'}</td>
                    <td style="font-weight:600;">${(m.nami || m.nama || '').toLowerCase()}</td>
                    <td>${m.nis || '-'}</td>
                    <td>${m.kelas || '-'}</td>
                    <td style="font-size:16px; font-weight:bold; color:var(--primary);">${m.peunteun || 0}</td>
                    <td style="color:var(--danger); font-weight:bold;">${m.cheat || 0}x</td>
                    <td><span class="status-badge ${cls}">${st}</span></td>
                </tr>`;
            });
            document.getElementById('stat-total').innerText = filtered.length;
            document.getElementById('stat-aktif').innerText = filtered.filter(x => (x.status||x.Status) === "AKTIF").length;
            document.getElementById('stat-nyontek').innerText = filtered.filter(x => (x.status||x.Status) === "NYONTEK").length;
            document.getElementById('stat-selesai').innerText = filtered.filter(x => (x.status||x.Status) === "SELESAI").length;
        }

        function renderAbsent(filter) {
            const tbody = document.getElementById('body-absent');
            tbody.innerHTML = "";
            
            // Murid nu geus login/ujian (candak NIS-na)
            const geusUjianNIS = rawData.map(m => String(m.nis || m.NIS));
            
            // Filter DataSiswa nu NIS-na euweuh dina RekapNilai
            const belumUjian = allSiswa.filter(s => {
                const nisSiswa = String(s.NIS || s.nis || Object.values(s)[1]);
                const klsSiswa = s.Kelas || s.kelas || Object.values(s)[2];
                const matchesFilter = (filter === "SEMUA" || klsSiswa === filter);
                return matchesFilter && !geusUjianNIS.includes(nisSiswa);
            });

            belumUjian.forEach(s => {
                tbody.innerHTML += `<tr>
                    <td style="font-weight:600;">${(s.Nami || s.nami || Object.values(s)[0])}</td>
                    <td>${s.NIS || s.nis || Object.values(s)[1]}</td>
                    <td>${s.Kelas || s.kelas || Object.values(s)[2]}</td>
                    <td><span class="status-badge st-absent">BELUM LOGIN</span></td>
                </tr>`;
            });
            document.getElementById('stat-absent').innerText = belumUjian.length;
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('view-monitoring').style.display = tab === 'monitoring' ? 'block' : 'none';
            document.getElementById('view-absensi').style.display = tab === 'absensi' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(tab)));
        }

        function exportExcel() {
            const idTabel = activeTab === 'monitoring' ? 'tabel-monitoring' : 'tabel-absent';
            const html = document.getElementById(idTabel).outerHTML;
            window.open('data:application/vnd.ms-excel,' + encodeURIComponent(html));
        }

        setInterval(loadData, 8000);
        loadData();
    </script>
</body>
</html>
