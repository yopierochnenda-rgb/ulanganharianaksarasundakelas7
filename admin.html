<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN RULES - MONITORING V2</title>
    <style>
        :root { --primary: #1a4d2e; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --blue: #3498db; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        
        header { 
            background: var(--primary); color: white; padding: 15px 20px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* FILTER & DOWNLOAD */
        .control-panel { 
            background: white; padding: 12px; border-radius: 10px; margin-bottom: 15px;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; min-width: 140px; font-size: 14px; }
        .btn-excel { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }

        /* STATS CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .stat-card { background: white; padding: 12px; border-radius: 10px; text-align: center; border-bottom: 3px solid #eee; }
        .stat-card h3 { margin: 0; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: bold; color: var(--primary); }

        /* TABLE STYLE */
        .table-container { 
            background: white; border-radius: 12px; padding: 5px; overflow-x: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        
        th { 
            background: #f8f9fa; padding: 12px 10px; text-align: left; 
            color: #666; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 1px; border-bottom: 2px solid #eee; 
        }
        
        td { padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        
        .nami-txt { font-weight: 600; color: #222; text-transform: capitalize; }
        .nilai-txt { font-size: 16px; font-weight: bold; color: var(--primary); }
        .waktu-txt { font-size: 10px; color: #999; }

        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .st-aktif { background: #e3f2fd; color: #1976d2; }
        .st-nyontek { background: #fee2e2; color: #dc2626; animation: blinker 1s infinite; }
        .st-selesai { background: #dcfce7; color: #166534; }

        @keyframes blinker { 50% { opacity: 0.4; } }
        .btn-refresh { background: white; color: var(--primary); border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h2 style="margin:0; font-size: 18px;">RULES MONITORING</h2>
            <span style="font-size: 10px; opacity: 0.8;">Live Data: RekapNilai</span>
        </div>
        <button class="btn-refresh" onclick="loadData()">🔄 REFRESH</button>
    </header>

    <div class="control-panel">
        <span style="font-size: 12px; font-weight: bold; color: #777;">FILTER KELAS:</span>
        <select id="filter-kelas" onchange="renderTable()">
            <option value="SEMUA">-- Sadayana --</option>
        </select>
        <button class="btn-excel" onclick="exportExcel()">📊 DOWNLOAD EXCEL</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>TOTAL</h3><p id="stat-total">0</p></div>
        <div class="stat-card" style="border-color: #3498db;"><h3>AKTIF</h3><p id="stat-aktif" style="color:#3498db;">0</p></div>
        <div class="stat-card" style="border-color: var(--danger);"><h3>NYONTEK</h3><p id="stat-nyontek" style="color:var(--danger);">0</p></div>
        <div class="stat-card" style="border-color: var(--success);"><h3>SELESAI</h3><p id="stat-selesai" style="color:var(--success);">0</p></div>
    </div>

    <div class="table-container">
        <table id="tabel-utama">
            <thead>
                <tr>
                    <th>WAKTU</th>
                    <th>NAMI</th>
                    <th>NIS</th>
                    <th>KELAS</th>
                    <th>PEUNTEUN</th>
                    <th>CHEAT</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="admin-body">
                <tr><td colspan="7" style="text-align:center; padding:30px; color:#999;">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6Ef7CfyJlMVy78391qO1X6H5ERi281jLTYaU1oun1dVONJnHjASBn9MAKMrVkHovC/exec";
        let rawData = [];

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL + "?sheet=RekapNilai");
                rawData = await res.json();
                
                // Update dropdown kelas otomatis
                const select = document.getElementById('filter-kelas');
                const current = select.value;
                const listKelas = [...new Set(rawData.map(m => m.kelas || m.Kelas))].filter(Boolean).sort();
                
                select.innerHTML = '<option value="SEMUA">-- Sadayana --</option>';
                listKelas.forEach(k => { select.innerHTML += `<option value="${k}">${k}</option>`; });
                select.value = current;

                renderTable();
            } catch (e) { console.error("Error:", e); }
        }

        function renderTable() {
            const tbody = document.getElementById('admin-body');
            const filter = document.getElementById('filter-kelas').value;
            tbody.innerHTML = "";
            
            const filtered = rawData.filter(m => filter === "SEMUA" || (m.kelas || m.Kelas) === filter);
            
            [...filtered].reverse().forEach(m => {
                let status = (m.status || m.Status || "AKTIF").toUpperCase();
                let badgeClass = status === "NYONTEK" ? "st-nyontek" : (status === "SELESAI" ? "st-selesai" : "st-aktif");
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="waktu-txt">${m.waktu || m.Waktu || m.timestamp || '-'}</td>
                    <td class="nami-txt">${(m.nami || m.nama || m.Nami || '').toLowerCase()}</td>
                    <td>${m.nis || m.NIS || '-'}</td>
                    <td style="font-weight:600;">${m.kelas || m.Kelas || '-'}</td>
                    <td class="nilai-txt">${m.peunteun || m.Peunteun || 0}</td>
                    <td style="color:var(--danger); font-weight:bold;">${m.cheat || 0}x</td>
                    <td><span class="status-badge ${badgeClass}">${status}</span></td>
                `;
                tbody.appendChild(tr);
            });

            // Update Stats
            document.getElementById('stat-total').innerText = filtered.length;
            document.getElementById('stat-aktif').innerText = filtered.filter(x => (x.status||x.Status) === "AKTIF").length;
            document.getElementById('stat-nyontek').innerText = filtered.filter(x => (x.status||x.Status) === "NYONTEK").length;
            document.getElementById('stat-selesai').innerText = filtered.filter(x => (x.status||x.Status) === "SELESAI").length;
        }

        function exportExcel() {
            const html = document.getElementById("tabel-utama").outerHTML;
            const url = 'data:application/vnd.ms-excel,' + encodeURIComponent(html);
            const link = document.createElement("a");
            link.href = url;
            link.download = "Rekap_Nilai_RULES.xls";
            link.click();
        }

        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
