<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RULES - SECURITY RADAR v2</title>
    <style>
        :root { --danger: #ff0000; --warning: #ffeb3b; --bg: #0a0a0a; --accent: #00fff2; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; padding: 0;
            overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* SCANNER LINE EFFECT */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: rgba(255, 0, 0, 0.5); box-shadow: 0 0 20px var(--danger);
            animation: scan 3s linear infinite; z-index: 10; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

        /* OVERLAY UNTUK AKTIFKAN SUARA */
        #audio-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; border: 5px solid var(--danger);
        }
        .gate-icon { font-size: 80px; animation: pulse-icon 1s infinite; }
        @keyframes pulse-icon { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        header {
            background: rgba(255, 0, 0, 0.1); border-bottom: 2px solid var(--danger);
            padding: 20px; text-align: center; box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        .alert-title { font-size: 35px; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 15px var(--danger); margin: 0; }
        .sub-title { font-size: 14px; color: var(--warning); letter-spacing: 3px; font-weight: bold; margin-top: 5px; }

        #container-nyontek {
            flex: 1; padding: 30px; display: flex; flex-direction: column;
            gap: 20px; overflow-y: auto; align-items: center; z-index: 5;
        }

        .card-warning {
            background: rgba(15, 15, 15, 0.9); border: 2px solid var(--danger);
            width: 100%; max-width: 950px; padding: 30px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
            animation: slide-in 0.5s ease-out; position: relative;
        }
        @keyframes slide-in { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .nami { font-size: 45px; font-weight: 900; color: #fff; text-transform: uppercase; margin: 0; line-height: 1; }
        .kelas { font-size: 24px; color: var(--warning); font-weight: bold; margin-top: 5px; }

        .status-box {
            background: var(--danger); color: white; padding: 15px 25px;
            border-radius: 12px; font-weight: 900; font-size: 20px;
            box-shadow: 0 0 20px var(--danger); animation: alert-blink 0.8s infinite;
        }
        @keyframes alert-blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #empty-state { margin-top: 15vh; text-align: center; opacity: 0.7; }
        .shield-icon { font-size: 120px; color: #00ff88; text-shadow: 0 0 20px #00ff88; }
        
        footer { padding: 15px; text-align: center; font-size: 12px; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="audio-gate" onclick="startSystem()">
        <div class="gate-icon">🚨</div>
        <h1 style="color:white; margin-top:20px;">KLIK DI DIEU</h1>
        <p style="color:var(--warning);">KANGGO NGAKTIFKEUN RADAR & SORA ALARM</p>
    </div>

    <header>
        <div class="alert-title">SECURITY MONITORING</div>
        <div class="sub-title">ANTI-CHEAT SYSTEM ACTIVE</div>
    </header>

    <div id="container-nyontek">
        <div id="empty-state">
            <div class="shield-icon">🛡️</div>
            <h1 style="color:#00ff88;">SADAYANA MURID AMAN</h1>
            <p>Tacan aya aktivitas mencurigakeun dinten ieu.</p>
        </div>
    </div>

    <footer>RULES BRAND - SECURE EXAM v3.0</footer>

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" preload="auto"></audio>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6Ef7CfyJlMVy78391qO1X6H5ERi281jLTYaU1oun1dVONJnHjASBn9MAKMrVkHovC/exec";
        let previousCount = 0;
        let isReady = false;

        function startSystem() {
            const alarm = document.getElementById('alarm-sound');
            // Coba putar sora sakali meh diijinan ku browser
            alarm.play().then(() => {
                alarm.pause();
                alarm.currentTime = 0;
                isReady = true;
                document.getElementById('audio-gate').style.display = 'none';
                fetchData(); // Langsung tarik data
            }).catch(e => alert("Mangga klik deui!"));
        }

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL + "?sheet=RekapNilai");
                const data = await response.json();
                
                // Saring data nu statusna NYONTEK
                const cheaters = data.filter(m => {
                    const st = (m.Status || m.status || "").toUpperCase();
                    return st.includes("NYONTEK");
                });

                updateUI(cheaters);
            } catch (err) {
                console.log("Error radar...");
            }
        }

        function updateUI(list) {
            const container = document.getElementById('container-nyontek');
            const alarm = document.getElementById('alarm-sound');

            if (list.length === 0) {
                container.innerHTML = `
                    <div id="empty-state">
                        <div class="shield-icon">🛡️</div>
                        <h1 style="color:#00ff88;">SADAYANA MURID AMAN</h1>
                        <p>Tacan aya aktivitas mencurigakeun dinten ieu.</p>
                    </div>`;
                previousCount = 0;
            } else {
                // Mun aya korban anyar, sora disada!
                if (isReady && list.length > previousCount) {
                    alarm.currentTime = 0;
                    alarm.play();
                }
                previousCount = list.length;

                container.innerHTML = "";
                list.forEach(m => {
                    const nama = m.Nami || m.nami || m.nama || "Unknown";
                    const kls = m.Kelas || m.kelas || m.kls || "-";
                    const jml = m.Cheat || m.cheat || 1;

                    container.innerHTML += `
                        <div class="card-warning">
                            <div>
                                <div class="nami">${nama.toLowerCase()}</div>
                                <div class="kelas">KELAS: ${kls}</div>
                            </div>
                            <div style="text-align:right">
                                <div class="status-box">PELANGGARAN: ${jml}x</div>
                                <div style="color:var(--danger); font-size:14px; margin-top:10px; font-weight:bold;">DETEKSI PINDAH LAYAR!</div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // Cek unggal 4 detik meh gancang kapanggihna
        setInterval(() => {
            if(isReady) fetchData();
        }, 4000);
    </script>
</body>
</html>
